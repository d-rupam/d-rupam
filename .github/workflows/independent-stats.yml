name: Generate Independent Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Build Main Stats & Langs (Node.js)
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p SVGs
          
          echo "Cloning stats repo..."
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          
          echo "Forcing Node dependencies to install safely..."
          npm install --legacy-peer-deps --no-audit --no-fund
          
          echo "Starting local Node server..."
          nohup node express.js > server.log 2>&1 &
          sleep 8
          
          echo "Fetching Main Stats..."
          if ! curl --fail --retry 5 --retry-delay 2 -o ../SVGs/stats.svg "http://localhost:9000/api?username=d-rupam&theme=radical&hide_border=true&show_icons=true"; then
            echo "NODE SERVER FAILED! Logs:"
            cat server.log
            exit 1
          fi
          
          echo "Fetching Langs Stats..."
          if ! curl --fail --retry 5 --retry-delay 2 -o ../SVGs/top-langs.svg "http://localhost:9000/api/top-langs/?username=d-rupam&layout=compact&theme=radical&hide_border=true"; then
            echo "NODE SERVER FAILED! Logs:"
            cat server.log
            exit 1
          fi
          
          cd ..

      - name: Build Streak Stats (PHP)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cloning streak repo..."
          git clone https://github.com/DenverCoder1/github-readme-streak-stats.git
          cd github-readme-streak-stats
          
          echo "Forcing PHP dependencies to install safely..."
          composer install --no-dev --ignore-platform-reqs
          
          echo "Starting local PHP server..."
          nohup php -S localhost:8000 > php.log 2>&1 &
          sleep 5
          
          echo "Fetching Streak Stats..."
          if ! curl --fail --retry 5 --retry-delay 2 -o ../SVGs/streak.svg "http://localhost:8000/?user=d-rupam&theme=radical&hide_border=true"; then
            echo "PHP SERVER FAILED! Logs:"
            cat php.log
            exit 1
          fi
          
          cd ..

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SVGs/
          git commit -m "Generated independent stats locally" || echo "No changes to commit"
          git push
