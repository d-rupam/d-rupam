name: Generate Independent Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (For Main Stats & Langs)
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Fixed deprecation warning

      - name: Setup PHP (For Streak Stats)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate Stats & Languages SVGs (Node.js)
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p SVGs
          
          # Clone and install dependencies
          git clone https://github.com/anuraghazra/github-readme-stats.git
          cd github-readme-stats
          npm ci
          
          # Start server explicitly on IPv4 loopback
          HOST=127.0.0.1 PORT=9000 npm start > server.log 2>&1 &
          
          # Wait patiently and curl IPv4 explicitly
          curl -4 --fail --retry 15 --retry-connrefused --retry-delay 2 -o ../SVGs/stats.svg "http://127.0.0.1:9000/api?username=d-rupam&theme=radical&hide_border=true&show_icons=true" || { echo "Node Server failed. Logs:"; cat server.log; exit 1; }
          curl -4 --fail --retry 15 --retry-connrefused --retry-delay 2 -o ../SVGs/top-langs.svg "http://127.0.0.1:9000/api/top-langs/?username=d-rupam&layout=compact&theme=radical&hide_border=true" || { echo "Node Server failed. Logs:"; cat server.log; exit 1; }
          
          # Kill the background process
          kill %1
          cd ..

      - name: Generate Streak SVG (PHP)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone and install dependencies
          git clone https://github.com/DenverCoder1/github-readme-streak-stats.git
          cd github-readme-streak-stats
          composer install
          
          # Start PHP server explicitly on IPv4 loopback
          php -S 127.0.0.1:8000 > php.log 2>&1 &
          
          # Wait patiently and curl IPv4 explicitly
          curl -4 --fail --retry 15 --retry-connrefused --retry-delay 2 -o ../SVGs/streak.svg "http://127.0.0.1:8000/?user=d-rupam&theme=radical&hide_border=true" || { echo "PHP Server failed. Logs:"; cat php.log; exit 1; }
          
          # Kill the background process
          kill %1
          cd ..

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SVGs/
          git commit -m "Generated independent stats locally" || echo "No changes to commit"
          git push
